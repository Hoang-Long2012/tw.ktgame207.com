{{- range $page := .Pages }}
<div class="post">
    <h2><a href="{{ $page.RelPermalink }}">{{ $page.LinkTitle }}</a></h2>
    
    {{- $lmd := printf "<script>document.write(ts_to_readable_time(get_timestamp(%q), false, %q, false));</script>" (partial "tformat.html" .Lastmod) "" }}
    <p class="post-date">{{ T "lastmod_short" $lmd | safeHTML }}</p>
    
    {{- with $page.Description }}
    <p class="post-description">{{ . }}</p>
    {{- end }}
</div>
{{- end }}
